name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-gcc:
    runs-on: ubuntu-latest

    # 複数のFedoraバージョンをマトリクスとして定義
    strategy:
      fail-fast: false
      matrix:
        # gcc 16 : Fedora 44
        # gcc 15 : Fedora 43
        # gcc 14 : Fedora 41
        fedora_version: ["44", "43", "41"]

    # 定義したバージョンを動的にコンテナへ割り当て
    container: fedora:${{ matrix.fedora_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y gcc-c++ cmake ninja-build git curl zip unzip tar

      - name: Check GCC version
        run: |
          g++ --version
          g++ -dumpversion | grep -E "^(1[4-9]|[2-9][0-9])(\.|\$)" || { echo "ERROR: GCC 14+ required, found $(g++ -dumpversion)"; exit 1; }

      # キャッシュキーにもFedoraのバージョンを混ぜてコンフリクトを防ぐ
      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-fedora-${{ matrix.fedora_version }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-fedora-${{ matrix.fedora_version }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

  windows-msvc:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg
            build\vcpkg_installed
          key: ${{ runner.os }}-msvc-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-msvc-vcpkg-

      - name: Setup vcpkg
        run: |
          if not exist C:\vcpkg (
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            call C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          )
        shell: cmd

      - name: Configure
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -V -C Release

  linux-clang:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # clang 22 : Fedora 44
        # clang 21 : Fedora 43
        # clang 20 : Fedora 42
        # clang 19 : Fedora 41
        fedora_version: ["44", "43", "42", "41"]

    container: fedora:${{ matrix.fedora_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y clang cmake ninja-build git curl zip unzip tar

      - name: Check Clang version
        run: clang++ --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-clang-${{ matrix.fedora_version }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-clang-${{ matrix.fedora_version }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja

      - name: Check compiler version
        run: clang++ --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V
